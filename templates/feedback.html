<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Analytics - CNIRS</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <style>
        .portfolio-back-link{position:fixed;top:16px;right:16px;z-index:9999;padding:10px 12px;border-radius:12px;background:rgba(15,23,42,.85);color:#fff;text-decoration:none;font:600 13px/1 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;backdrop-filter:blur(8px);box-shadow:0 10px 30px rgba(0,0,0,.2)}
        .portfolio-back-link:hover{background:rgba(15,23,42,.95)}
    </style>
    <a class="portfolio-back-link" href="https://neojustin.dothost.net/projects/information-retrieval">回到作品集</a>
    <div class="container">
        <header class="header">
            <h1>Feedback Analytics</h1>
            <p class="subtitle">Search Logs, User Feedback, and LTR Feature Foundation</p>
            <nav class="nav">
                <a href="./" class="nav-link">搜尋</a>
                <a href="compare" class="nav-link">模型對比</a>
                <a href="expand" class="nav-link">查詢擴展</a>
                <a href="evaluation" class="nav-link">評估分析</a>
                <a href="diagnostics" class="nav-link">Ranking Diagnostics</a>
                <a href="feedback" class="nav-link active">Feedback</a>
                <a href="corpus" class="nav-link">語料庫</a>
                <a href="guide" class="nav-link">導覽</a>
                <a href="about" class="nav-link">關於</a>
            </nav>
        </header>

        <section class="feedback-control-panel">
            <div class="config-group">
                <label for="feedback-days">Window:</label>
                <select id="feedback-days">
                    <option value="7">Last 7 days</option>
                    <option value="30" selected>Last 30 days</option>
                    <option value="90">Last 90 days</option>
                    <option value="365">Last 365 days</option>
                </select>
            </div>
            <div class="config-group">
                <label for="feedback-limit">Rows:</label>
                <input id="feedback-limit" type="number" value="20" min="5" max="100" step="5">
            </div>
            <button id="refresh-feedback-btn" class="btn btn-primary">Refresh Analytics</button>
        </section>

        <div id="feedback-loading" class="loading" style="display:none;">
            <div class="spinner"></div>
            <p>Loading feedback analytics...</p>
        </div>

        <main id="feedback-dashboard" class="feedback-dashboard"></main>
    </div>

    <script src="static/js/feedback-analytics.js"></script>
    <script src="static/js/demo-assistant.js"></script>
</body>
</html>
