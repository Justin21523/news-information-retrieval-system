<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語料庫儀表板 - CNIRS</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet" href="static/css/facet.css">
</head>
<body>
    <style>
        .portfolio-back-link{position:fixed;top:16px;right:16px;z-index:9999;padding:10px 12px;border-radius:12px;background:rgba(15,23,42,.85);color:#fff;text-decoration:none;font:600 13px/1 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;backdrop-filter:blur(8px);box-shadow:0 10px 30px rgba(0,0,0,.2)}
        .portfolio-back-link:hover{background:rgba(15,23,42,.95)}
    </style>
    <a class="portfolio-back-link" href="https://neojustin.dothost.net/projects/information-retrieval">回到作品集</a>
    <div class="container">
        <header class="header">
            <h1>CNIRS 語料庫儀表板</h1>
            <p class="subtitle">大型語料狀態、metadata 品質、taxonomy facets 與 IR pipeline 可視化</p>
            <nav class="nav">
                <a href="./" class="nav-link">搜尋</a>
                <a href="compare" class="nav-link">模型對比</a>
                <a href="expand" class="nav-link">查詢擴展</a>
                <a href="evaluation" class="nav-link">評估分析</a>
                <a href="diagnostics" class="nav-link">排序診斷</a>
                <a href="feedback" class="nav-link">回饋分析</a>
                <a href="corpus" class="nav-link active">語料庫</a>
                <a href="guide" class="nav-link">導覽</a>
                <a href="about" class="nav-link">關於</a>
            </nav>
        </header>

        <main class="corpus-page">
            <section id="corpus-loading" class="loading">
                <div class="spinner"></div>
                <p>正在載入語料庫稽核...</p>
            </section>

            <section id="corpus-error" class="no-results" style="display: none;"></section>

            <section id="corpus-content" style="display: none;">
                <div id="corpus-summary" class="stats-panel"></div>

                <div class="dashboard-grid">
                    <article class="dashboard-card dashboard-card-wide">
                        <div class="dashboard-card-header">
                            <h2>Demo 準備狀態</h2>
                            <span id="readiness-status" class="status-pill"></span>
                        </div>
                        <div id="readiness-checks" class="readiness-list"></div>
                    </article>

                    <article class="dashboard-card">
                        <h2>來源分布</h2>
                        <div id="source-distribution" class="bar-list"></div>
                    </article>

                    <article class="dashboard-card">
                        <h2>Taxonomy 分布</h2>
                        <div id="taxonomy-distribution" class="bar-list"></div>
                    </article>

                    <article class="dashboard-card">
                        <h2>日期覆蓋</h2>
                        <div id="year-distribution" class="bar-list compact"></div>
                    </article>

                    <article class="dashboard-card">
                        <h2>Index Cache</h2>
                        <div id="index-cache" class="detail-list"></div>
                    </article>

                    <article class="dashboard-card dashboard-card-wide">
                        <h2>Metadata 完整度</h2>
                        <div id="metadata-completeness" class="completeness-grid"></div>
                    </article>

                    <article class="dashboard-card dashboard-card-wide">
                        <h2>Facet 品質</h2>
                        <div id="facet-quality" class="completeness-grid"></div>
                        <div id="facet-quality-notes" class="known-gaps"></div>
                    </article>

                    <article class="dashboard-card dashboard-card-wide">
                        <h2>IR 系統流程</h2>
                        <div id="system-flow" class="flow-diagram"></div>
                    </article>

                    <article class="dashboard-card dashboard-card-wide">
                        <div class="dashboard-card-header">
                            <h2>Topic Explorer</h2>
                            <span class="status-pill">輕量 clustering</span>
                        </div>
                        <div class="topic-controls">
                            <input type="text" id="topic-query" placeholder="輸入要探索 topic 的 query，例如：半導體 人工智慧">
                            <select id="topic-method">
                                <option value="kmeans">K-means</option>
                                <option value="hierarchical">HAC</option>
                            </select>
                            <input type="number" id="topic-clusters" value="5" min="2" max="12">
                            <input type="number" id="topic-sample-size" value="120" min="10" max="200">
                            <button id="run-topic-explorer" class="btn btn-primary">分析 Topics</button>
                        </div>
                        <div id="topic-status" class="explain-muted"></div>
                        <div id="topic-results" class="topic-results"></div>
                    </article>

                    <article class="dashboard-card dashboard-card-wide">
                        <h2>外部資料策略</h2>
                        <div id="external-sources" class="external-source-list"></div>
                    </article>
                </div>
            </section>
        </main>
    </div>

    <script src="static/js/i18n.js"></script>
    <script src="static/js/corpus.js"></script>
    <script src="static/js/demo-assistant.js"></script>
</body>
</html>
