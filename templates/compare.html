<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型對比 - CNIRS</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <style>
        .portfolio-back-link{position:fixed;top:16px;right:16px;z-index:9999;padding:10px 12px;border-radius:12px;background:rgba(15,23,42,.85);color:#fff;text-decoration:none;font:600 13px/1 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;backdrop-filter:blur(8px);box-shadow:0 10px 30px rgba(0,0,0,.2)}
        .portfolio-back-link:hover{background:rgba(15,23,42,.95)}
    </style>
    <a class="portfolio-back-link" href="https://neojustin.dothost.net/projects/information-retrieval">回到作品集</a>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🔍 CNIRS - 模型對比</h1>
            <p class="subtitle">比較不同檢索模型的效能與結果</p>
            <nav class="nav">
                <a href="./" class="nav-link">搜尋</a>
                <a href="compare" class="nav-link active">模型對比</a>
                <a href="expand" class="nav-link">查詢擴展</a>
                <a href="evaluation" class="nav-link">評估分析</a>
                <a href="diagnostics" class="nav-link">排序診斷</a>
                <a href="feedback" class="nav-link">回饋分析</a>
                <a href="corpus" class="nav-link">語料庫</a>
                <a href="guide" class="nav-link">導覽</a>
                <a href="about" class="nav-link">關於</a>
            </nav>
        </header>

        <!-- Search Box -->
        <div class="search-box">
            <input type="text" id="query-input" placeholder="輸入查詢關鍵字進行模型對比...">

            <div class="search-options">
                <div class="option-group">
                    <label>選擇模型 (可多選):</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="models" value="bm25" checked> BM25</label>
                        <label><input type="checkbox" name="models" value="tfidf" checked> TF-IDF</label>
                        <label><input type="checkbox" name="models" value="hybrid" checked> Hybrid</label>
                        <label><input type="checkbox" name="models" value="lm" checked> LM</label>
                        <label><input type="checkbox" name="models" value="bim"> BIM</label>
                        <label><input type="checkbox" name="models" value="wand_bm25"> WAND</label>
                        <label><input type="checkbox" name="models" value="maxscore_bm25"> MaxScore</label>
                        <label><input type="checkbox" name="models" value="boolean"> Boolean</label>
                    </div>
                </div>

                <div class="option-group">
                    <label for="topk-input">Top-K:</label>
                    <input type="number" id="topk-input" value="10" min="5" max="20" step="5">
                </div>

                <button id="compare-btn" class="btn btn-primary">開始對比</button>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>正在比較模型...</p>
        </div>

        <!-- Comparison Results -->
        <div id="comparison-container"></div>

        <footer class="footer">
            <p>&copy; 2025 CNIRS | Model Comparison Tool</p>
        </footer>
    </div>

    <script src="static/js/explanation-panel.js"></script>
    <script src="static/js/document-modal.js"></script>
    <script src="static/js/compare.js"></script>
</body>
</html>
